[build]
publish = "dist"
command = "npm run build"

[[headers]]
for = "/*"

[headers.values]
Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(self), microphone=(), geolocation=()"
Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://xltfpnufkflmjzksynve.supabase.co https://*.runware.ai; connect-src 'self' https://xltfpnufkflmjzksynve.supabase.co wss://xltfpnufkflmjzksynve.supabase.co https://qfitpwdrswvnbmzvkoyd.supabase.co wss://ws-api.runware.ai; media-src 'self' blob:; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self' https://teachingtools.dev"
